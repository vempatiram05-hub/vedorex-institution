<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Courses — Knowledge Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── TOKENS ──────────────────────────────────────────────── */
  :root {
    --ink:    #0f0e0d;
    --paper:  #f5f0e8;
    --cream:  #ede7d9;
    --rust:   #c0392b;
    --gold:   #b8860b;
    --muted:  #7a7168;
    --card:   #ffffff;
    --border: #d8d0c2;
    --shadow: 0 2px 24px rgba(15,14,13,.08);
    --r: 4px;
    --ff-head: 'Playfair Display', Georgia, serif;
    --ff-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--ff-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 56px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,.015) 40px,
      rgba(255,255,255,.015) 80px
    );
    pointer-events: none;
  }
  .header-eyebrow {
    font-family: var(--ff-body);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  header h1 {
    font-family: var(--ff-head);
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -.02em;
    margin-bottom: 16px;
  }
  header h1 em {
    font-style: italic;
    color: var(--gold);
  }
  header p {
    color: rgba(245,240,232,.65);
    max-width: 480px;
    margin: 0 auto 36px;
    font-size: 16px;
    font-weight: 300;
  }

  /* ── SEARCH BAR ─────────────────────────────────────────── */
  .search-wrap {
    max-width: 560px;
    margin: 0 auto;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    width: 18px; height: 18px;
  }
  #searchInput {
    width: 100%;
    padding: 16px 18px 16px 50px;
    font-family: var(--ff-body);
    font-size: 15px;
    border: 2px solid transparent;
    border-radius: 50px;
    background: rgba(245,240,232,.1);
    color: var(--paper);
    outline: none;
    transition: background .2s, border-color .2s;
    backdrop-filter: blur(8px);
  }
  #searchInput::placeholder { color: rgba(245,240,232,.4); }
  #searchInput:focus {
    background: rgba(245,240,232,.15);
    border-color: var(--gold);
  }

  /* ── MAIN ───────────────────────────────────────────────── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── STATUS BAR ─────────────────────────────────────────── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .status-bar .count {
    font-family: var(--ff-head);
    font-size: 1.1rem;
    font-weight: 700;
  }
  .status-bar .count span { color: var(--rust); }
  .status-bar .hint {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── GRID ───────────────────────────────────────────────── */
  #coursesGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 28px;
  }

  /* ── CARD ───────────────────────────────────────────────── */
  .course-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    transition: transform .22s ease, box-shadow .22s ease;
    animation: fadeUp .4s ease both;
  }
  .course-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 40px rgba(15,14,13,.13);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-thumb {
    height: 180px;
    background: var(--cream);
    overflow: hidden;
    position: relative;
  }
  .card-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .4s ease;
  }
  .course-card:hover .card-thumb img { transform: scale(1.04); }
  .card-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--ff-head);
    font-size: 3rem;
    color: var(--border);
    background: linear-gradient(135deg, var(--cream) 0%, #e8e0d0 100%);
  }

  .level-badge {
    position: absolute;
    top: 12px; right: 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    background: var(--ink);
    color: var(--paper);
  }
  .level-badge.Beginner     { background: #2e7d32; }
  .level-badge.Intermediate { background: #e65100; }
  .level-badge.Advanced     { background: var(--rust); }

  .card-body {
    padding: 22px 22px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card-category {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .card-title {
    font-family: var(--ff-head);
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .card-desc {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.55;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 14px 22px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
  }
  .card-footer .instructor { display: flex; align-items: center; gap: 6px; }
  .card-footer .instructor svg { width: 14px; height: 14px; }
  .card-footer .duration   { display: flex; align-items: center; gap: 5px; }
  .card-footer .duration svg { width: 14px; height: 14px; }

  /* ── TAGS ───────────────────────────────────────────────── */
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 22px 14px;
  }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
  }

  /* ── EMPTY / LOADING ────────────────────────────────────── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
  }
  .empty-state svg { width: 56px; height: 56px; color: var(--border); margin-bottom: 20px; }
  .empty-state h3 {
    font-family: var(--ff-head);
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .empty-state p { color: var(--muted); }

  .skeleton {
    background: linear-gradient(90deg, var(--cream) 25%, var(--border) 50%, var(--cream) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--r);
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .card-skel { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .card-skel .skel-thumb { height: 180px; }
  .card-skel .skel-body  { padding: 22px; }
  .card-skel .skel-line  { height: 14px; margin-bottom: 12px; border-radius: 3px; }
  .card-skel .skel-line.w60 { width: 60%; }
  .card-skel .skel-line.w80 { width: 80%; }
  .card-skel .skel-line.w40 { width: 40%; }
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header>
  <p class="header-eyebrow">Knowledge Hub</p>
  <h1>Explore Our <em>Courses</em></h1>
  <p>Discover everything available — browse freely or search for exactly what you need.</p>

  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      id="searchInput"
      type="search"
      placeholder="Search by title, instructor, or category…"
      autocomplete="off"
    />
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────────── -->
<main>
  <div class="status-bar">
    <div class="count" id="countLabel">Loading…</div>
    <div class="hint" id="hintLabel"></div>
  </div>

  <div id="coursesGrid">
    <!-- skeleton placeholders -->
    ${[1,2,3,4,5,6].map(() => `
      <div class="card-skel">
        <div class="skel-thumb skeleton"></div>
        <div class="skel-body">
          <div class="skel-line w40 skeleton"></div>
          <div class="skel-line w80 skeleton"></div>
          <div class="skel-line skeleton"></div>
          <div class="skel-line w60 skeleton"></div>
        </div>
      </div>`).join('')}
  </div>
</main>

<script>
  /* ── CONFIG — point this to your Strapi instance ── */
  const API_BASE = 'http://localhost:1337/api/courses-showcase';

  /* ── STATE ── */
  let debounceTimer = null;
  let currentSearch = '';

  /* ── FETCH ── */
  async function fetchCourses(search = '') {
    const url = new URL(`${API_BASE}/courses`);
    if (search) url.searchParams.set('search', search);
    url.searchParams.set('pageSize', '100');

    try {
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (err) {
      return { error: err.message };
    }
  }

  /* ── RENDER ── */
  function levelClass(level) {
    return level || '';
  }

  function renderCard(course, index) {
    const { title, description, level, category, instructor, duration, thumbnail, tags, slug } = course;

    const thumbHtml = thumbnail?.url
      ? `<img src="http://localhost:1337${thumbnail.url}" alt="${title}" loading="lazy" />`
      : `<div class="card-thumb-placeholder">📚</div>`;

    const tagsArr = Array.isArray(tags) ? tags : [];
    const tagsHtml = tagsArr.length
      ? `<div class="card-tags">${tagsArr.slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('')}</div>`
      : '';

    return `
      <article class="course-card" style="animation-delay:${index * 60}ms">
        <div class="card-thumb">
          ${thumbHtml}
          ${level ? `<span class="level-badge ${levelClass(level)}">${level}</span>` : ''}
        </div>
        <div class="card-body">
          ${category ? `<div class="card-category">${category}</div>` : ''}
          <h2 class="card-title">${title}</h2>
          ${description ? `<p class="card-desc">${description}</p>` : ''}
        </div>
        ${tagsHtml}
        <div class="card-footer">
          ${instructor
            ? `<span class="instructor">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                ${instructor}
               </span>`
            : '<span></span>'}
          ${duration
            ? `<span class="duration">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                ${duration}
               </span>`
            : ''}
        </div>
      </article>`;
  }

  function renderEmpty(search) {
    return `
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <h3>No courses found</h3>
        <p>Try a different search term — or clear to browse all courses.</p>
      </div>`;
  }

  function renderError(msg) {
    return `
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <h3>Could not load courses</h3>
        <p>${msg}</p>
      </div>`;
  }

  async function load(search = '') {
    const grid     = document.getElementById('coursesGrid');
    const countEl  = document.getElementById('countLabel');
    const hintEl   = document.getElementById('hintLabel');

    countEl.textContent = 'Loading…';
    hintEl.textContent  = '';

    const result = await fetchCourses(search);

    if (result.error) {
      grid.innerHTML = renderError(result.error);
      countEl.textContent = 'Error';
      return;
    }

    const { data: courses, meta } = result;

    if (!courses || courses.length === 0) {
      grid.innerHTML = renderEmpty(search);
      countEl.innerHTML = `<span>0</span> courses`;
      hintEl.textContent = search ? `for "${search}"` : '';
      return;
    }

    grid.innerHTML = courses.map((c, i) => renderCard(c, i)).join('');
    countEl.innerHTML = `<span>${meta.total}</span> course${meta.total !== 1 ? 's' : ''}`;
    hintEl.textContent = search ? `matching "${search}"` : 'available to explore';
  }

  /* ── SEARCH ── */
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      currentSearch = e.target.value.trim();
      load(currentSearch);
    }, 320);
  });

  /* ── INIT ── */
  load();
</script>
</body>
</html>
